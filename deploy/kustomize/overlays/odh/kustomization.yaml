apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Operator-managed overlay for Open Data Hub (ODH).
# The operator sets the target namespace via its namespace plugin and
# replaces image references via base/params.env at deploy time.

namespace: opendatahub

resources:
  - ../openshift

patches:
  # Remove the Namespace resource — the operator manages namespace lifecycle.
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: rhoai-mcp

replacements:
  - source:
      kind: ServiceAccount
      name: rhoai-mcp
      fieldPath: metadata.namespace
    targets:
      - select:
          kind: ClusterRoleBinding
          name: rhoai-mcp
        fieldPaths:
          - subjects.[kind=ServiceAccount].namespace
      - select:
          kind: Route
          name: rhoai-mcp
        fieldPaths:
          - metadata.namespace
